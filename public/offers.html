<!DOCTYPE html>
<html>
<head>
  <title>Cafe Backyard - Offers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">Cafe Backyard</div>
  <div class="nav-links" id="navLinks">
    <a href="/">Menu</a>
    <a href="/offers.html">Offers</a>
    <a href="/profile.html">My Orders</a>
    <a href="/login.html" id="loginLink">Login</a>
    <a href="#" id="logoutLink" style="display:none;" onclick="logout()">Logout</a>
  </div>
</nav>

<header class="hero">
  <h1>🔥 Special Offers</h1>
  <p>Because good food should come with great deals</p>
</header>

<h2 class="section-title">Today’s Deals</h2>

<div id="offers" class="menu-grid"></div>

<script>
fetch("/offers")
  .then(res => res.json())
  .then(data => {
    const div = document.getElementById("offers");

    data.forEach(offer => {
      const card = document.createElement("div");
      card.className = "offer-card";

      let img = "";
      if (offer.image && offer.image.trim() !== "") {
        img = `<img src="${offer.image}" class="food-img">`;
      }

      card.innerHTML = `
        ${img}
        <h3>${offer.title}</h3>
        <p>${offer.description}</p>
        <strong>₹${offer.price}</strong>
      `;

      div.appendChild(card);
    });
  });
</script>

</body>
</html>
