<!DOCTYPE html>
<html>
<head>
  <title>Cafe Backyard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
  <div class="logo">Cafe Backyard</div>
  <div class="nav-links" id="navLinks">
    <a href="/">Menu</a>
    <a href="/offers.html">Offers</a>
    <a href="/profile.html">My Orders</a>
    <a href="/login.html" id="loginLink">Login</a>
    <a href="#" id="logoutLink" style="display:none;" onclick="logout()">Logout</a>
  </div>
</nav>

  <!-- HERO -->
  <header class="hero">
    <h1>🍽 Cafe Backyard</h1>
    <p>Fresh • Tasty • Made with Love</p>
  </header>

  <!-- MENU -->
 <h2 class="section-title">Our Menu</h2>

<input 
  type="text" 
  id="searchInput" 
  placeholder="🔍 Search for dishes..." 
  class="search-bar"
/>

<div id="menu" class="menu-grid"></div>

  <!-- CART -->
  <div class="cart-box">
    <h3>🛒 Your Order</h3>
    <div id="cart"></div>
    <p>Total: ₹<span id="total">0</span></p>
    <input id="address" placeholder="Enter delivery address">
    <button onclick="placeOrder()">Place Order</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
